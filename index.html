*{box-sizing:border-box;margin:0;padding:0}
:root{

.tariff-bar b{color:var(--text);font-weight:600}
.tariff-bar .edit-btn{background:none;border:1px solid var(--border);border-radius:4px;padding:2px 8px;font-size:9px;cursor:pointer;font-family:inherit;color:var(--blue);margin-left:4px}

.fbar select,.fbar input{padding:5px 10px;border:1px solid var(--border);border-radius:6px;font-size:11px;font-family:inherit;background:#fff}

.fbar .export-btn{margin-left:auto;padding:5px 12px;border:1px solid var(--gt);border-radius:6px;font-size:10px;cursor:pointer;font-family:inherit;background:var(--gbg);color:var(--gt);font-weight:600}
.fbar label{font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px}

.page{padding:16px 20px 40px;display:none}

.kpi{background:var(--card);border-radius:var(--r);padding:12px;border:1px solid var(--border);position:relative}
.kpi-l{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);margin-bottom:4px;display:flex;align-items:center;gap:4px}
.kpi-v{font-size:18px;font-weight:700}
.kpi-s{font-size:10px;color:var(--muted);margin-top:1px}
.tip{display:inline-flex;align-items:center;justify-content:center;width:13px;height:13px;border-radius:50%;background:#f1f5f9;color:var(--muted);font-size:8px;font-weight:700;cursor:help;position:relative;flex-shrink:0}
.tip:hover::after{content:attr(data-t);position:absolute;bottom:18px;left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;padding:6px 10px;border-radius:6px;font-size:10px;font-weight:400;white-space:nowrap;z-index:99;max-width:260px;white-space:normal;line-height:1.4;text-transform:none;letter-spacing:0}

.card-t{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;margin-bottom:8px;display:flex;align-items:center;gap:5px}

/* Footer */
.ftr{padding:14px;text-align:center;font-size:9px;color:var(--muted);border-top:1px solid var(--border)}
.green{color:var(--gt)}.red{color:var(--red)}.amber{color:#d97706}.blue{color:var(--blue)}.purple{color:var(--pt)}
.bold{font-weight:700}.w6{font-weight:600}.w5{font-weight:500}
.hidden{display:none}
</style>
</head>

function cellVal(s,sz){
const raw=s.sizes[sz]||0;
if(mMode==="stock")return raw;
if(mMode==="toCust")return Math.round(raw*.3);
if(mMode==="fromCust")return Math.round(raw*.05);
if(mMode==="sales")return Math.round(raw*.7);
if(mMode==="transit")return s.transit>0?Math.round(raw*.3):0;
if(mMode==="storeRisk")return raw===0&&s.dns>28?1:0;
if(mMode==="total")return raw;
return raw;
}
function cellColor(val){
if(val===0)return{bg:"var(--rbg)",t:"var(--rt)"};
if(val<=2)return{bg:"var(--obg)",t:"var(--ot)"};
if(val<=4)return{bg:"var(--ybg)",t:"var(--yt)"};
return{bg:"var(--gbg)",t:"var(--gt)"};
}

${stockPts.map((pt,i)=>`<text x="${pt.x}" y="${10+gH+14}" text-anchor="middle" font-size="8" fill="#9ca3af">${months[i]||''}</text>`).join("")}
