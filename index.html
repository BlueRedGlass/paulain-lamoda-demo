<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paulain × Lamoda — Операционный центр</title>
<link href="https://fonts.googleapis.com/css2?family=Onest:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f6f5f2;--card:#fff;--border:#e8e7e3;--text:#1a1a1a;--muted:#8a8a8a;
  --green:#16a34a;--green-bg:#dcfce7;--green-t:#166534;
  --yellow-bg:#fef9c3;--yellow-t:#854d0e;
  --orange-bg:#fed7aa;--orange-t:#9a3412;
  --red:#dc2626;--red-bg:#fecaca;--red-t:#991b1b;
  --blue:#2563eb;--blue-bg:#dbeafe;--blue-t:#1e40af;
  --pink-bg:#fce7f3;--pink-t:#9d174d;
  --purple:#7c3aed;--purple-bg:#ede9fe;--purple-t:#5b21b6;
  --radius:10px;
}
body{font-family:'Onest',-apple-system,sans-serif;background:var(--bg);color:var(--text);font-size:13px;line-height:1.5}
.header{background:linear-gradient(135deg,#0f172a,#1e293b);color:#fff;padding:20px 24px 0}
.header-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.brand{font-size:10px;font-weight:600;letter-spacing:2.5px;text-transform:uppercase;opacity:.4;margin-bottom:3px}
.title{font-size:20px;font-weight:700}
.upd{text-align:right;font-size:11px;opacity:.5}
.nav{display:flex;gap:2px;overflow-x:auto}
.nav button{padding:9px 18px;border:none;border-radius:8px 8px 0 0;font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;transition:.2s;white-space:nowrap}
.nav button.on{background:var(--bg);color:var(--text);font-weight:600}
.nav button:not(.on){background:rgba(255,255,255,.06);color:rgba(255,255,255,.45)}
.nav button:not(.on):hover{background:rgba(255,255,255,.12);color:rgba(255,255,255,.7)}
.page{padding:20px 24px 40px;display:none}
.page.show{display:block}
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:18px}
.kpi{background:var(--card);border-radius:var(--radius);padding:14px;border:1px solid var(--border)}
.kpi-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:5px}
.kpi-val{font-size:20px;font-weight:700}
.kpi-sub{font-size:11px;color:var(--muted);margin-top:2px}
.card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);padding:16px;margin-bottom:14px}
.card-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.two{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:700px){.two{grid-template-columns:1fr}}
.alert{padding:9px 12px;border-radius:8px;font-size:12px;display:flex;align-items:flex-start;gap:8px;margin-bottom:6px}
.alert-r{background:#fef2f2;border:1px solid #fecaca;color:#991b1b}
.alert-y{background:#fffbeb;border:1px solid #fde68a;color:#92400e}
.alert-b{background:#eff6ff;border:1px solid #bfdbfe;color:#1e40af}
.todo{padding:8px 0;border-bottom:1px solid var(--border);font-size:12px;display:flex;gap:8px;align-items:flex-start}
.todo:last-child{border:none}
.todo-num{background:#f1f5f9;border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--muted);flex-shrink:0}
.list-row{display:flex;justify-content:space-between;padding:5px 0;font-size:12px}
.list-row:not(:last-child){border-bottom:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:12px}
th{padding:8px 10px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);background:#fafaf8;position:sticky;top:0;cursor:pointer;user-select:none;white-space:nowrap;border-bottom:2px solid var(--border)}
td{padding:8px 10px;border-bottom:1px solid var(--border)}
tbody tr{cursor:pointer;transition:.15s}
tbody tr:hover{background:#f9f9f6}
tbody tr.sel{background:#fffbeb}
.pill{display:inline-block;padding:2px 9px;border-radius:20px;font-size:10px;font-weight:600;white-space:nowrap}
.tbl-wrap{overflow-x:auto;border-radius:var(--radius);border:1px solid var(--border);background:var(--card)}
.filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.filters select,.filters input{padding:6px 10px;border:1px solid var(--border);border-radius:6px;font-size:11px;font-family:inherit;background:var(--card)}
.hint{font-size:11px;color:var(--muted);margin-bottom:10px}
.sku-card{margin-top:14px;border:1px solid var(--border);border-radius:var(--radius);background:var(--card);overflow:hidden}
.sku-card-head{padding:16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px}
.sku-card-name{font-size:17px;font-weight:700}
.sku-card-sub{font-size:12px;color:var(--muted)}
.sku-sections{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:0}
.sku-section{padding:16px;border-right:1px solid var(--border);border-bottom:1px solid var(--border)}
.sku-section:last-child{border-right:none}
.sku-section-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:10px}
.sku-row{display:flex;justify-content:space-between;padding:3px 0;font-size:12px}
.sku-row .label{color:var(--muted)}
.sku-row .val{font-weight:600}
.override-area{padding:16px;background:#fafaf8;border-top:1px solid var(--border)}
.override-area textarea{width:100%;border:1px solid var(--border);border-radius:6px;padding:8px;font-size:12px;font-family:inherit;resize:vertical;min-height:40px;margin-top:6px}
.override-btns{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.override-btns button{padding:5px 12px;border:1px solid var(--border);border-radius:6px;font-size:11px;font-family:inherit;cursor:pointer;background:var(--card);transition:.15s}
.override-btns button:hover{background:#f1f5f9}
.override-btns button.active{background:var(--blue-bg);border-color:var(--blue);color:var(--blue-t)}
.timeline{margin-top:10px}
.tl-item{padding:6px 0 6px 16px;border-left:2px solid var(--border);font-size:11px;color:var(--muted);position:relative}
.tl-item::before{content:'';position:absolute;left:-4px;top:10px;width:6px;height:6px;border-radius:50%;background:var(--border)}
.tl-item .tl-date{font-weight:600;color:var(--text)}
.matrix-cell{width:42px;height:34px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;border-radius:4px;margin:1px}
.scenario-box{margin-top:14px;background:linear-gradient(135deg,#fff7ed,#fef3c7);border:1px solid #fed7aa;border-radius:var(--radius);padding:16px}
.scenario-title{font-size:13px;font-weight:600;color:#92400e;margin-bottom:6px}
.scenario-text{font-size:12px;color:#78350f;line-height:1.6}
.ai-box{margin-top:14px;background:linear-gradient(135deg,#eff6ff,#f5f3ff);border-radius:var(--radius);padding:16px;border:1px solid #c7d2fe}
.ai-title{font-size:12px;font-weight:700;color:var(--purple-t);margin-bottom:8px}
.ai-text{font-size:12px;line-height:1.7;color:#374151}
.ai-text p{margin-bottom:6px}
.ai-text p:last-child{margin:0}
.footer{padding:16px;text-align:center;font-size:10px;color:var(--muted);border-top:1px solid var(--border)}
.green{color:var(--green-t)}.red{color:var(--red)}.amber{color:#d97706}.blue{color:var(--blue)}
.bold{font-weight:700}.w600{font-weight:600}.w500{font-weight:500}
</style>
</head>
<body>

<div class="page" id="p0"></div>

<script>
// ===== DATA =====
const SKU = [

  {id:4,model:"Пилар",color:"шоколад",cat:"Юбка",sizes:{44:2,46:3,48:4,50:3,52:2,54:2,56:1,58:1},ordered:12,bought:8,ret:3,stock:18,transit:0,cost:2800,price:8950,promo:0,commRate:.5,log:264,pack:134,store:480,turn:"low",dns:19,ship:1,priority:"обычный",comment:"Попробовать в комплекте с блузами",fabric:"есть"},

  {id:6,model:"Илайн бейс",color:"шоколад",cat:"Блуза",sizes:{46:2,48:2,50:2,52:2,54:3},ordered:3,bought:1,ret:1,stock:11,transit:0,cost:3219,price:10950,promo:0,commRate:.5,log:264,pack:134,store:1320,turn:"zero",dns:34,ship:1,priority:"не трогать",comment:"Рассмотреть вывоз + пересъёмка",fabric:"есть"},
  {id:7,model:"Леони",color:"розовый кварц",cat:"Блуза",sizes:{44:1,46:2,48:2,50:2,52:2},ordered:5,bought:3,ret:1,stock:9,transit:0,cost:4170,price:13950,promo:0,commRate:.5,log:264,pack:134,store:720,turn:"zero",dns:31,ship:1,priority:"обычный",comment:"Подумать о цене",fabric:"есть"},
  {id:8,model:"Альба",color:"чёрный",cat:"Платье",sizes:{42:1,44:2,46:3,48:0,50:0,52:1,54:0,56:0,58:0},ordered:16,bought:12,ret:2,stock:15,transit:3,cost:4400,price:12950,promo:0,commRate:.5,log:264,pack:134,store:0,turn:"medium",dns:6,ship:3,priority:"обычный",comment:"",fabric:"есть"},

  {id:10,model:"Микаэль",color:"лаванда",cat:"Блуза",sizes:{44:2,46:3,48:3,50:2,52:2},ordered:8,bought:6,ret:0,stock:12,transit:0,cost:3600,price:10950,promo:0,commRate:.5,log:264,pack:134,store:240,turn:"low",dns:15,ship:2,priority:"обычный",comment:"",fabric:"в пути"},
  {id:11,model:"Кассандра",color:"изумруд",cat:"Платье",sizes:{44:1,46:2,48:2,50:1,52:1,54:1,56:1},ordered:31,bought:26,ret:2,stock:9,transit:5,cost:5500,price:16950,promo:0,commRate:.5,log:264,pack:134,store:0,turn:"high",dns:1,ship:4,priority:"высокий",comment:"Держать полный ряд",fabric:"есть"},
  {id:12,model:"Виола",color:"пудра",cat:"Платье",sizes:{42:3,44:3,46:3,48:3,50:3,52:2,54:2},ordered:11,bought:7,ret:2,stock:19,transit:0,cost:4100,price:12450,promo:0,commRate:.5,log:264,pack:134,store:360,turn:"low",dns:22,ship:2,priority:"обычный",comment:"",fabric:"есть"},
];

function ec(s){
  const comm=s.price*s.commRate;
  const fullCost=s.cost+s.pack+s.log+(s.store||0);
  const netPayout=s.price-comm-s.log-(s.store||0);
  const profit=netPayout-s.cost-s.pack;
  const margin=s.price>0?(profit/s.price)*100:0;
  return{comm,fullCost,netPayout,profit,margin};
}

const TC={high:{bg:"var(--green-bg)",t:"var(--green-t)",l:"Высокая"},medium:{bg:"var(--yellow-bg)",t:"var(--yellow-t)",l:"Нормальная"},low:{bg:"var(--orange-bg)",t:"var(--orange-t)",l:"Слабая"},zero:{bg:"var(--red-bg)",t:"var(--red-t)",l:"Нулевая"}};
const FC={есть:{bg:"var(--green-bg)",t:"var(--green-t)"},"в пути":{bg:"var(--blue-bg)",t:"var(--blue-t)"},брак:{bg:"var(--red-bg)",t:"var(--red-t)"},дефицит:{bg:"var(--orange-bg)",t:"var(--orange-t)"}};
const fmt=n=>Math.round(n).toLocaleString("ru-RU");
const fR=n=>fmt(n)+" ₽";

const tO=SKU.reduce((a,s)=>a+s.ordered,0);
const tB=SKU.reduce((a,s)=>a+s.bought,0);
const tRet=SKU.reduce((a,s)=>a+s.ret,0);
const tStock=SKU.reduce((a,s)=>a+s.stock,0);
const tTransit=SKU.reduce((a,s)=>a+s.transit,0);
const tRevG=SKU.reduce((a,s)=>a+s.price*s.bought,0);
const tProfit=SKU.reduce((a,s)=>a+ec(s).profit*s.bought,0);
const tStoreLoss=SKU.reduce((a,s)=>a+(s.store||0),0);
const sellTh=((tB/tO)*100).toFixed(1);
const retR=((tRet/tO)*100).toFixed(1);
const avgM=(tProfit/tRevG*100).toFixed(1);
const deficit=SKU.filter(s=>s.stock<3).length;

// ===== NAVIGATION =====
const pages=["Главный экран","Запасы и движение","Экономика SKU","Карточка SKU"];
let cur=0;
const nav=document.getElementById("nav");
function renderNav(){
  nav.innerHTML="";
  pages.forEach((p,i)=>{
    const b=document.createElement("button");
    b.textContent=p;b.className=i===cur?"on":"";
    b.onclick=()=>{cur=i;renderNav();showPage()};
    nav.appendChild(b);
  });
}
function showPage(){[0,1,2,3].forEach(i=>{document.getElementById("p"+i).className="page"+(i===cur?" show":"")});}

// ===== PAGE 0: MAIN SCREEN =====
function renderP0(){
  const alerts=[];
  SKU.forEach(s=>{
    if(s.stock<3)alerts.push({t:"r",icon:"📦",msg:`<b>${s.model} ${s.color}</b> — остаток ${s.stock} шт, риск out-of-stock`});
    if(s.dns>=28)alerts.push({t:"y",icon:"⏱",msg:`<b>${s.model} ${s.color}</b> — ${s.dns} дн. без продаж → платное хранение ${fR(s.store)}`});
  });
  if(SKU.some(s=>s.ret>2))alerts.push({t:"r",icon:"↩️",msg:`<b>3 возврата</b> с риском убытка — проверить качество`});

  const todos=[
    "Догрузить <b>Белла Бьянка</b> 44/46 — дефицит, потеря ~85 000₽/нед",
    "Проверить 3 возврата <b>Джипси красный</b> — превышен порог",
    "Не запускать скидку по <b>Стоун</b> — хранение дешевле",
    "Вывоз <b>Остин/Фейт</b> + пересъёмка → раздельные артикулы",
    "Подтвердить резервы по готовым изделиям на среду",
  ];

  const top5=[...SKU].sort((a,b)=>ec(b).profit*b.bought-ec(a).profit*a.bought).slice(0,5);
  const worst=[...SKU].filter(s=>ec(s).profit<0||s.dns>=28).sort((a,b)=>ec(a).profit*a.bought-ec(b).profit*b.bought).slice(0,4);

  document.getElementById("p0").innerHTML=`
    <div class="kpi-row">
      ${[{l:"Выручка net",v:fR(tRevG-tRevG*.5),s:"после комиссии Lamoda"},{l:"Валовая прибыль",v:fR(tProfit),s:"маржа ${avgMargin}%",c:"green"},{l:"Маржа",v:avgM+"%",s:"валовая прибыль / net"},{l:"Риск хранения",v:fR(tStoreLoss),s:SKU.filter(s=>s.store>0).length+" SKU",c:tStoreLoss>0?"red":""},{l:"Дефицит",v:deficit+" SKU",s:"остаток < 3 шт",c:deficit>0?"red":""}].map(k=>`
        <div class="kpi"><div class="kpi-label">${k.l}</div><div class="kpi-val ${k.c||''}">${k.v}</div><div class="kpi-sub">${k.s}</div></div>`).join("")}
    </div>
    <div class="two">
      <div>
        <div class="card">
          <div class="card-title">📋 Очередь действий на сегодня</div>
          ${todos.map((t,i)=>`<div class="todo"><div class="todo-num">${i+1}</div><div>${t}</div></div>`).join("")}
        </div>
        <div class="card">
          <div class="card-title" style="color:var(--green-t)">🔥 Топ-5 SKU по прибыли</div>
          ${top5.map(s=>`<div class="list-row"><span class="w500">${s.model} ${s.color}</span><span class="w600 green">${fR(ec(s).profit*s.bought)}</span></div>`).join("")}
        </div>
      </div>
      <div>
        <div class="card">
          <div class="card-title">🚨 Алерты и исключения</div>
          ${alerts.map(a=>`<div class="alert alert-${a.t}">${a.icon} ${a.msg}</div>`).join("")}
        </div>
        <div class="card">
          <div class="card-title" style="color:var(--red-t)">📉 SKU с просадкой / убытком</div>
          ${worst.map(s=>{const p=ec(s);return`<div class="list-row"><span class="w500">${s.model} ${s.color}</span><span class="w600 ${p.profit<0?'red':'amber'}">${p.profit<0?fR(p.profit*s.bought):s.dns+'дн. ∅'}</span></div>`}).join("")}
        </div>
      </div>
    </div>
    <div class="ai-box">
      <div class="ai-title">🤖 AI-рекомендации (еженедельно)</div>
      <div class="ai-text">
        <p><b>Приоритет догрузки:</b> Белла Бьянка, Джипси, Кассандра — генерируют 72% прибыли. Белла Бьянка в критическом дефиците, потенциальная потеря выручки ~85 000₽/неделю.</p>
        <p><b>Скидка vs хранение:</b> По Остин/Фейт хранение уже 840₽, скидка 20% экономит ~560₽/мес — но пересъёмка и раздельные артикулы дадут больше. Рекомендация: вывоз.</p>
        <p><b>Ценовая возможность:</b> По 4 позициям с нулевой оборачиваемостью снижение цены на 15% может дать +12-18 продаж/мес и экономию на хранении 3 360₽/мес.</p>
      </div>
    </div>`;
}

// ===== PAGE 1: INVENTORY MATRIX =====
let matrixMode="stock"; // stock, sales28, returns, storeRisk, transit
let selMatrix=null;

function cellColor(val,mode){
  if(mode==="stock"){
    if(val===0)return{bg:"var(--red-bg)",t:"var(--red-t)"};
    if(val<=2)return{bg:"var(--orange-bg)",t:"var(--orange-t)"};
    if(val<=4)return{bg:"var(--yellow-bg)",t:"var(--yellow-t)"};
    return{bg:"var(--green-bg)",t:"var(--green-t)"};
  }
  if(mode==="storeRisk"){
    if(val>500)return{bg:"var(--red-bg)",t:"var(--red-t)"};
    if(val>0)return{bg:"var(--yellow-bg)",t:"var(--yellow-t)"};
    return{bg:"#f0fdf4",t:"var(--green-t)"};
  }
  if(val===0)return{bg:"#f9fafb",t:"#ccc"};
  if(val<=1)return{bg:"var(--yellow-bg)",t:"var(--yellow-t)"};
  return{bg:"var(--green-bg)",t:"var(--green-t)"};
}

function renderP1(){
  const modes=[{k:"stock",l:"Остаток"},{k:"sales28",l:"Продажи 28д"},{k:"returns",l:"Возвраты"},{k:"storeRisk",l:"Риск хранения"},{k:"transit",l:"В пути"}];
  const allSizes=[42,44,46,48,50,52,54,56,58];

  let html=`<div class="filters">
    <span style="font-size:11px;color:var(--muted);padding:6px 0">Режим:</span>
    ${modes.map(m=>`<button onclick="matrixMode='${m.k}';renderP1()" style="padding:5px 12px;border:1px solid ${matrixMode===m.k?'var(--blue)':'var(--border)'};border-radius:6px;font-size:11px;font-family:inherit;cursor:pointer;background:${matrixMode===m.k?'var(--blue-bg)':'var(--card)'};color:${matrixMode===m.k?'var(--blue-t)':'var(--text)'}">${m.l}</button>`).join("")}
  </div>
  <div class="hint">Цвет ячейки = сигнал для решения · Нажмите на строку для боковой панели</div>
  <div class="tbl-wrap"><table>
    <thead><tr><th style="text-align:left">Модель / цвет</th>${allSizes.map(s=>`<th style="text-align:center;min-width:44px">${s}</th>`).join("")}<th style="text-align:center">Итого</th><th style="text-align:center">Оборач.</th></tr></thead>
    <tbody>`;

  SKU.forEach(s=>{
    const t=TC[s.turn];
    let total=0;
    const cells=allSizes.map(sz=>{
      const raw=s.sizes[sz];
      if(raw===undefined)return`<td style="text-align:center"><div class="matrix-cell" style="background:#f9fafb;color:#ddd;margin:auto">—</div></td>`;
      let val=raw;
      if(matrixMode==="sales28")val=Math.round(raw*.7);
      if(matrixMode==="returns")val=Math.round(raw*.1);
      if(matrixMode==="storeRisk")val=raw===0&&s.dns>28?Math.round(s.store/Math.max(Object.keys(s.sizes).length,1)):0;
      if(matrixMode==="transit")val=s.transit>0?Math.round(raw*.3):0;
      total+=raw;
      const c=cellColor(val,matrixMode);
      return`<td style="text-align:center"><div class="matrix-cell" style="background:${c.bg};color:${c.t};margin:auto">${val}</div></td>`;
    });
    html+=`<tr class="${selMatrix===s.id?'sel':''}" onclick="selMatrix=${selMatrix===s.id?'null':s.id};renderP1()">
      <td class="w500"><div>${s.model}</div><div style="font-size:10px;color:var(--muted)">${s.color} · ${s.cat}</div></td>
      ${cells.join("")}
      <td style="text-align:center" class="w600">${total}</td>
      <td style="text-align:center"><span class="pill" style="background:${t.bg};color:${t.t}">${t.l}</span></td>
    </tr>`;
  });
  html+=`</tbody></table></div>`;

  // Side panel
  if(selMatrix){
    const s=SKU.find(x=>x.id===selMatrix);
    if(s){
      const p=ec(s);
      html+=`<div class="sku-card" style="margin-top:14px">
        <div style="padding:14px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px">
          <div><div class="kpi-label">Последняя продажа</div><div class="w600">${s.dns===0?'Сегодня':s.dns+' дн. назад'}</div></div>
          <div><div class="kpi-label">Дни до платного хранения</div><div class="w600 ${s.dns>=28?'red':s.dns>=20?'amber':'green'}">${Math.max(28-s.dns,0)}</div></div>
          <div><div class="kpi-label">Прибыль/шт</div><div class="w600 ${p.profit>0?'green':'red'}">${fR(p.profit)}</div></div>
          <div><div class="kpi-label">Нужно догрузить?</div><div class="w600 ${s.stock<6?'red':''}">${s.stock<3?'❗ СРОЧНО':s.stock<6?'Да, скоро':'Нет'}</div></div>
          <div><div class="kpi-label">Скидка выгодна?</div><div class="w600">${s.store>0&&s.store>p.profit*0.15?'Да, хранение дороже':'Нет, держать цену'}</div></div>
          <div><div class="kpi-label">Ткань</div><div class="w600"><span class="pill" style="background:${(FC[s.fabric]||FC["есть"]).bg};color:${(FC[s.fabric]||FC["есть"]).t}">${s.fabric}</span></div></div>
        </div>
        <div style="padding:0 14px 14px;text-align:right">
          <button onclick="selMatrix=null;cur=3;selCard=${s.id};renderNav();showPage();renderP3()" style="padding:6px 14px;border:1px solid var(--blue);border-radius:6px;background:var(--blue-bg);color:var(--blue-t);font-size:11px;font-family:inherit;cursor:pointer">Открыть карточку SKU →</button>
        </div>
      </div>`;
    }
  }

  // Legend
  html+=`<div style="margin-top:12px;display:flex;gap:10px;flex-wrap:wrap;font-size:10px;color:var(--muted)">
    ${[{c:"var(--red-bg)",l:"Риск / ноль"},{c:"var(--orange-bg)",l:"Внимание"},{c:"var(--yellow-bg)",l:"Умеренно"},{c:"var(--green-bg)",l:"Здоровое движение"},{c:"var(--pink-bg)",l:"В пути"},{c:"#f9fafb",l:"Новое / нет данных"}].map(x=>`<div style="display:flex;align-items:center;gap:3px"><div style="width:12px;height:12px;border-radius:3px;background:${x.c}"></div>${x.l}</div>`).join("")}
  </div>`;

  document.getElementById("p1").innerHTML=html;
}

// ===== PAGE 2: UNIT ECONOMICS =====
let econSort="totalProfit",econDir=-1;

function renderP2(){
  const sorted=[...SKU].sort((a,b)=>{
    const pa=ec(a),pb=ec(b);
    if(econSort==="totalProfit")return econDir*(pa.profit*a.bought-pb.profit*b.bought);
    if(econSort==="margin")return econDir*(pa.margin-pb.margin);
    if(econSort==="profit")return econDir*(pa.profit-pb.profit);
    if(econSort==="store")return econDir*((a.store||0)-(b.store||0));
    return 0;
  });

  const cols=[
    {k:"name",l:"SKU",a:"left"},{k:"price",l:"RRP"},{k:"cost",l:"Себес"},{k:"comm",l:"Комиссия"},{k:"log",l:"Логист."},
    {k:"store",l:"Хранение"},{k:"pack",l:"Упаковка"},{k:"profit",l:"Прибыль/шт"},{k:"margin",l:"Маржа"},{k:"bought",l:"Продано"},{k:"totalProfit",l:"Прибыль ∑"}
  ];
  const arrow=k=>econSort===k?(econDir>0?" ↑":" ↓"):"";

  let html=`
    <div class="kpi-row">
      ${[{l:"Выручка gross",v:fR(tRevG),s:"цена продажи до удержаний"},{l:"Выручка net",v:fR(tRevG-SKU.reduce((a,s)=>a+s.price*s.commRate*s.bought,0)),s:"после Lamoda и скидок"},{l:"Валовая прибыль",v:fR(tProfit),s:"net − полная себестоимость",c:"green"},{l:"Потери хранение",v:fR(tStoreLoss),s:SKU.filter(s=>s.store>0).length+" позиций",c:tStoreLoss>0?"red":""},{l:"Потери возвраты",v:fR(SKU.reduce((a,s)=>a+s.ret*(s.cost+s.log),0)),s:tRet+" шт",c:"red"}].map(k=>`
        <div class="kpi"><div class="kpi-label">${k.l}</div><div class="kpi-val ${k.c||''}">${k.v}</div><div class="kpi-sub">${k.s}</div></div>`).join("")}
    </div>
    <div class="hint">Нажмите заголовок для сортировки · Формулы из unit-экономики файла «ф 111»</div>
    <div class="tbl-wrap"><table>
      <thead><tr>${cols.map(c=>`<th style="text-align:${c.a||'right'}" onclick="econSort='${c.k}';econDir=${econSort===c.k?-econDir:-1};renderP2()">${c.l}${arrow(c.k)}</th>`).join("")}</tr></thead>
      <tbody>`;

  sorted.forEach(s=>{
    const p=ec(s);
    const tp=p.profit*s.bought;
    html+=`<tr>
      <td class="w500"><div>${s.model} ${s.color}</div><div style="font-size:10px;color:var(--muted)">${s.cat}</div></td>
      <td style="text-align:right">${fmt(s.price)}</td>
      <td style="text-align:right">${fmt(s.cost)}</td>
      <td style="text-align:right;color:var(--red-t)">${fmt(Math.round(p.comm))}</td>
      <td style="text-align:right">${fmt(s.log)}</td>
      <td style="text-align:right;color:${s.store>0?'var(--red)':'#ccc'}">${s.store>0?fmt(s.store):'—'}</td>
      <td style="text-align:right">${fmt(s.pack)}</td>
      <td style="text-align:right" class="bold ${p.profit>0?'green':'red'}">${fR(p.profit)}</td>
      <td style="text-align:right" class="w600 ${p.margin>20?'green':p.margin>0?'amber':'red'}">${p.margin.toFixed(1)}%</td>
      <td style="text-align:right">${s.bought}</td>
      <td style="text-align:right" class="bold ${tp>0?'green':'red'}">${fR(tp)}</td>
    </tr>`;
  });

  html+=`</tbody><tfoot><tr class="bold"><td>ИТОГО</td><td colspan="8"></td><td style="text-align:right">${tB}</td><td style="text-align:right;color:var(--green-t)">${fR(tProfit)}</td></tr></tfoot></table></div>`;

  html+=`<div class="scenario-box">
    <div class="scenario-title">💡 Блок решений: скидка vs хранение</div>
    <div class="scenario-text">
      <b>Илайн бейс:</b> хранение 1 320₽, прибыль/шт ${fR(ec(SKU[5]).profit)} — скидка 15% сэкономит на хранении, но маржа станет отрицательной → <b>рекомендация: вывоз</b><br>
      <b>Остин/Фейт:</b> хранение 840₽, 42 дня без продаж → скидка не поможет, нужна пересъёмка → <b>рекомендация: вывоз + раздельные артикулы</b><br>
      <b>Пилар шоколад:</b> хранение 480₽, маржа ${ec(SKU[3]).margin.toFixed(0)}% — скидка 10% всё ещё прибыльна → <b>рекомендация: попробовать скидку</b>
    </div>
  </div>`;

  document.getElementById("p2").innerHTML=html;
}

// ===== PAGE 3: SKU CARD =====
let selCard=5;

function renderP3(){
  const skuList=SKU.map(s=>`<option value="${s.id}" ${s.id===selCard?'selected':''}>${s.model} ${s.color}</option>`).join("");

  const s=SKU.find(x=>x.id===selCard);
  if(!s){document.getElementById("p3").innerHTML=`<div class="card">Выберите SKU</div>`;return;}
  const p=ec(s);
  const t=TC[s.turn];
  const f=FC[s.fabric]||FC["есть"];

  const events=[
    {d:"05.04",t:"Выкуп — 2 шт (размер 48, 52)"},
    {d:"03.04",t:"Невыкуп — 1 шт (размер 44) → возвращён на склад"},
    {d:"01.04",t:"Заказ — 4 шт"},
    {d:"28.03",t:"Поставка #"+s.ship+" принята: "+Object.values(s.sizes).reduce((a,v)=>a+v,0)+" шт"},
    {d:"25.03",t:"Отгрузка со склада Хабаровск"},
  ];

  document.getElementById("p3").innerHTML=`
    <div class="filters">
      <select onchange="selCard=+this.value;renderP3()" style="font-weight:600;min-width:200px">${skuList}</select>
    </div>
    <div class="sku-card">
      <div class="sku-card-head">
        <div>
          <div class="sku-card-name">${s.model} ${s.color}</div>
          <div class="sku-card-sub">${s.cat} · Размеры ${Object.keys(s.sizes).join(", ")} · EAN · Поставка #${s.ship}</div>
        </div>
        <div style="display:flex;gap:6px">
          <span class="pill" style="background:${t.bg};color:${t.t}">Оборачиваемость: ${t.l}</span>
          <span class="pill" style="background:${f.bg};color:${f.t}">Ткань: ${s.fabric}</span>
        </div>
      </div>

      <div class="sku-sections">
        <div class="sku-section">
          <div class="sku-section-title">📦 Остатки и движение</div>
          ${[["На Lamoda",s.stock+" шт"],["В пути",s.transit>0?s.transit+" шт":"—"],["Продажи 7 дн.",Math.round(s.bought*.25)+" шт"],["Продажи 28 дн.",s.bought+" шт"],["Невыкупы",Math.round(s.ordered-s.bought-s.ret)+" шт"],["Возвраты",s.ret+" шт"],["Дн. без продаж",s.dns]].map(r=>`<div class="sku-row"><span class="label">${r[0]}</span><span class="val ${typeof r[1]==='number'&&r[1]>=28?'red':''}">${r[1]}</span></div>`).join("")}
        </div>
        <div class="sku-section">
          <div class="sku-section-title">💰 Экономика</div>
          ${[["RRP (базовая цена)",fR(s.price)],["Комиссия Lamoda (50%)",fR(p.comm)],["Логистика",fR(s.log)],["Упаковка / маркировка",fR(s.pack)],["Хранение",s.store>0?fR(s.store):"—"],["Произв. себестоимость",fR(s.cost)],["Net payout",fR(p.netPayout)],["Прибыль / шт","<span class='bold "+(p.profit>0?"green":"red")+"'>"+fR(p.profit)+"</span>"],["Маржинальность","<span class='w600 "+(p.margin>20?"green":p.margin>0?"amber":"red")+"'>"+p.margin.toFixed(1)+"%</span>"]].map(r=>`<div class="sku-row"><span class="label">${r[0]}</span><span class="val">${r[1]}</span></div>`).join("")}
        </div>
        <div class="sku-section">
          <div class="sku-section-title">🔄 Пополнение</div>
          ${[["Рекомендовано догрузить",s.stock<3?"8-12 шт ❗":s.stock<8?"4-6 шт":"Не требуется"],["Целевая дата на Lamoda",s.stock<6?"до 15.04":"—"],["Статус заказа",s.transit>0?"В пути ("+s.transit+" шт)":"Не размещён"],["Площадка пошива","Хабаровск"],["Риск out-of-stock",s.stock<3?"<span class='red bold'>ВЫСОКИЙ</span>":s.stock<6?"<span class='amber'>Средний</span>":"Низкий"]].map(r=>`<div class="sku-row"><span class="label">${r[0]}</span><span class="val">${r[1]}</span></div>`).join("")}
        </div>
      </div>

      <div style="padding:16px;border-top:1px solid var(--border)">
        <div class="sku-section-title">📜 История событий</div>
        <div class="timeline">
          ${events.map(e=>`<div class="tl-item"><span class="tl-date">${e.d}</span> — ${e.t}</div>`).join("")}
        </div>
      </div>

      <div class="override-area">
        <div class="sku-section-title">✏️ Ручной override</div>
        <div class="override-btns">
          <span style="font-size:11px;color:var(--muted);padding:5px 0">Приоритет:</span>
          ${["высокий","обычный","не трогать"].map(x=>`<button class="${s.priority===x?'active':''}" onclick="SKU.find(s=>s.id===${s.id}).priority='${x}';renderP3()">${x}</button>`).join("")}
        </div>
        <div class="override-btns" style="margin-top:6px">
          <span style="font-size:11px;color:var(--muted);padding:5px 0">Решение:</span>
          ${["ускорить","держать","скидировать","вывезти"].map(x=>`<button>${x}</button>`).join("")}
        </div>
        <textarea placeholder="Комментарий к SKU...">${s.comment}</textarea>
      </div>
    </div>`;
}

// ===== INIT =====
renderNav();renderP0();renderP1();renderP2();renderP3();showPage();
</script>
</body>
</html>
